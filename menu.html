<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - FAMI-NA Express</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
    <div id="header"></div>

    <main>
        <section class="menu-section">
            <div class="container">
                <h2>Our Menu</h2>
                <p class="menu-lead">
                    Explore our full menu and order your favorites in one click.
                </p>
                <div class="menu-category-pills" id="menu-categories">
                    <!-- Categories will be populated by JavaScript -->
                </div>

                <div class="results-info">
                    <span id="results-count">0 items found</span>
                </div>

                <div class="menu-grid" id="menu-items">
                    <!-- Menu items will be populated by JavaScript -->
                </div>
            </div>
        </section>
    </main>

    <div id="footer"></div>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/frontend-api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/menu.js"></script>
</body>
</html>
