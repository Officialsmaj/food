<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAMI-NA Express - Delicious Food Delivery</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
    <div id="header"></div>

    <main>
        <section class="hero">
            <div class="container">
                <div class="hero-content">
                    <h1>Delicious Food Delivered Fast</h1>
                    <p>Order from your favorite restaurants and get it delivered to your doorstep in minutes.</p>
                    <a href="menu.html" class="cta-button">Order Now</a>
                </div>
            </div>
        </section>

        <section class="categories">
            <div class="container">
                <h2 data-i18n="categories.title">Explore Categories</h2>
                <div class="category-grid" id="categories-grid">
                    <!-- Categories will be populated by JavaScript -->
                </div>
            </div>
        </section>

        <section class="restaurants">
            <div class="container">
                <h2>Featured Restaurants</h2>
                <div class="restaurant-grid" id="restaurants-grid">
                    <!-- Restaurants will be populated by JavaScript -->
                </div>
            </div>
        </section>
    </main>

    <div id="footer"></div>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/frontend-api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/home.js"></script>
</body>
</html>
